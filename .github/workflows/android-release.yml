name: Build APK and publish release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  build-apk:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Read app version
        id: version
        run: echo "version=$(node -p "require('./app.json').expo.version")" >> "$GITHUB_OUTPUT"

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: cp "${{ steps.apk.outputs.path }}" "OpenSkolae-${{ steps.version.outputs.version }}-${{ github.run_number }}.apk"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: OpenSkolae v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            Automated build from PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}

            Merge commit: ${{ github.sha }}
          files: OpenSkolae-${{ steps.version.outputs.version }}-${{ github.run_number }}.apk
